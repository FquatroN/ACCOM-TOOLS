<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Accomodation Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="config.js"></script>
    <script defer src="auth-guard.js"></script>
    <script defer src="gate.js"></script>
    <style>
      :root {
        --bg-1: #fff9ef;
        --bg-2: #f8f6f2;
        --card: #ffffff;
        --text: #171412;
        --muted: #665a53;
        --line: #e8ded6;
        --brand: #0d6e6e;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        color: var(--text);
        font-family: "Space Grotesk", sans-serif;
        background:
          radial-gradient(90rem 35rem at 85% -10%, #ffeabf 0%, transparent 55%),
          radial-gradient(80rem 25rem at -10% 0%, #dbf5f3 0%, transparent 55%),
          linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        visibility: hidden;
      }
      .card {
        width: min(500px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 1.1rem;
      }
      .eyebrow {
        margin: 0;
        font-family: "IBM Plex Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.85;
        font-size: 0.78rem;
      }
      h1 {
        margin: 0.35rem 0;
        font-size: 1.5rem;
      }
      p {
        margin: 0.2rem 0 0.7rem;
        color: var(--muted);
      }
      label {
        display: grid;
        gap: 0.35rem;
        margin-bottom: 0.6rem;
        color: var(--muted);
      }
      input {
        border: 1px solid #d8cbc2;
        border-radius: 10px;
        background: #fff;
        padding: 0.58rem 0.7rem;
        color: var(--text);
        font: inherit;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      button {
        border: 1px solid transparent;
        border-radius: 10px;
        background: var(--brand);
        color: #fff;
        font-weight: 600;
        padding: 0.58rem 0.82rem;
        cursor: pointer;
      }
      button.ghost {
        background: #fff;
        color: #134766;
        border-color: #c8dbe0;
      }
      .status {
        margin-top: 0.6rem;
        min-height: 1.2rem;
        font-size: 0.86rem;
        color: var(--muted);
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Access Control</p>
      <h1 id="gate-title">Sign In</h1>
      <p id="gate-description">Authenticate first, then you will enter the application.</p>

      <label id="email-field">
        Email
        <input id="email" type="email" placeholder="team@company.com" />
      </label>
      <label id="password-field">
        Password
        <input id="password" type="password" placeholder="Password" />
      </label>
      <label id="confirm-password-field" hidden>
        Confirm Password
        <input id="confirm-password" type="password" placeholder="Repeat the new password" />
      </label>

      <div class="actions">
        <button id="signin" type="button">Sign in</button>
        <button id="signup" type="button" class="ghost">Create account</button>
        <button id="forgot-password" type="button" class="ghost">Forgot password</button>
        <button id="back-to-signin" type="button" class="ghost" hidden>Back to sign in</button>
      </div>
      <div id="status" class="status"></div>
    </main>
  </body>
</html>
